name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Step-by-step; include the exact commands you ran
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Git Bash on Windows (supported)
        - WSL2 (not yet supported)
        - macOS (not yet supported)
        - Linux (not yet supported)
        - Cygwin (not supported)
    validations:
      required: true
  - type: input
    id: bash-version
    attributes:
      label: bash --version
      placeholder: e.g. GNU bash, version 5.2.15(1)-release
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output, hook-script output, or contents of `~/.claude/cairn/` files that seem relevant
